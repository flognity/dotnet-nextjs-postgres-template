services:
  postgres:
    image: postgres:16-alpine
    container_name: template-webapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: template-webapp
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d template-webapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  flyway:
    image: flyway/flyway:10
    command: -url=jdbc:postgresql://postgres:5432/template-webapp -user=app -password=app migrate
    volumes:
      - ./db/migrations:/flyway/sql
    depends_on:
      - postgres

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Database=template-webapp;Username=app;Password=app
    ports:
      - "5000:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
